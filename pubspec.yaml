name: scholar
description: "App Search for institutes .."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  curved_navigation_bar: ^1.0.6
  flutter_rating_bar: ^4.0.1
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  reactive_forms: ^18.2.0
  go_router: ^17.0.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  icons_launcher: ^3.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  flex_color_scheme: ^8.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/iconn.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/iconn.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/